# Versión del formato de Docker Compose que se usa
version: "3.9"

services:
  # ─────────────────────────────────────────────────────────────
  # Servicio de base de datos MariaDB
  # ─────────────────────────────────────────────────────────────
  # MariaDB — uso la imagen oficial de la versión 11.8. Le paso las credenciales mediante variables de entorno para que cree la base de datos automáticamente al arrancar. Los datos persisten gracias al volumen db_data aunque el contenedor se destruya.

  hp_mariadb:
    #Image: Es una plantilla preconfigurada que contiene el sistema operativo y el software necesario.
    image: mariadb:11.8        # Usa la imagen oficial de MariaDB versión 11.8
    container_name: hp_mariadb # Nombre del contenedor
    restart: always            # Si el contenedor se cae, se reinicia automáticamente

    environment:               # Variables de entorno que configura la BD al arrancar
      MYSQL_ROOT_PASSWORD: rootpassword  # Contraseña del usuario root de MariaDB
      MYSQL_DATABASE: harryquiz          # Nombre de la base de datos que se crea automáticamente
      MYSQL_USER: hpuser                 # Usuario con acceso a esa base de datos
      MYSQL_PASSWORD: hppassword         # Contraseña de ese usuario

    ports:
      - "3306:3306"            # Mapea el puerto 3306 del contenedor al 3306 de tu máquina

    volumes:
      - db_data:/var/lib/mysql # Los datos de MariaDB persisten aunque el contenedor se destruya
  
  # ─────────────────────────────────────────────────────────────
  # Servicio de la aplicación FastAPI (el quiz)
  # ─────────────────────────────────────────────────────────────
  # FastAPI — en vez de usar una imagen descargada, la construyo desde mi Dockerfile con build: .. Le paso las credenciales de la BD mediante variables de entorno para que database.py pueda conectarse. Uso expose en vez de ports para que el puerto 8000 solo sea accesible internamente — el usuario no puede acceder directamente a la app, solo Nginx puede. Las imágenes subidas persisten gracias al volumen que monta ./static/uploads en el contenedor.
  hp_quiz_app:
    build: .                   # Construye la imagen usando el Dockerfile de la carpeta actual
    container_name: hp_quiz_app
    restart: always

    depends_on:
      - hp_mariadb             # Espera a que hp_mariadb arranque antes de iniciarse

    # Ya NO exponemos el puerto 8000 al exterior
    # Solo Nginx puede acceder a la app internamente
    expose:
      - "8000"

    environment:
      DB_HOST: hp_mariadb
      DB_PORT: 3306
      DB_USER: hpuser
      DB_PASSWORD: hppassword
      DB_NAME: harryquiz

    volumes:
      - ./static/uploads:/app/static/uploads

  # ─────────────────────────────────────────────────────────────
  # Servicio Nginx (proxy inverso)
  # Recibe las peticiones del usuario y las redirige a hp_quiz_app
  # ─────────────────────────────────────────────────────────────
  #Nginx — actúa como proxy inverso. Escucha en el puerto 80 y redirige el tráfico internamente a la app. Monto mi archivo nginx.conf en el contenedor en modo solo lectura para que Nginx use mi configuración.
  hp_nginx:
    image: nginx:alpine        # Imagen oficial de Nginx (versión ligera)
    container_name: hp_nginx
    restart: always

    ports:
      - "80:80"                # Expone el puerto 80 (HTTP estándar) al exterior
                               # Así se accede en http://localhost sin poner puerto

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro  # Monta nuestra configuración de Nginx
                                                      # :ro = solo lectura

    depends_on:
      - hp_quiz_app            # Espera a que la app esté lista antes de arrancar

# ─────────────────────────────────────────────────────────────
# Volúmenes nombrados
# ─────────────────────────────────────────────────────────────
volumes:
  db_data:

# Los tres servicios tienen restart: always para que se reinicien automáticamente si se caen, y depends_on para que arranquen en el orden correcto — primero MariaDB, luego la app, y finalmente Nginx."


# MariaDB          FastAPI              Nginx
# ────────         ────────             ────────
# Almacena         Procesa la           Recibe el
# los datos   ←→  lógica y   ←→       tráfico del
#              conecta con la BD        usuario

# MariaDB → image + environment (credenciales) + volumes (persistir datos)
# FastAPI → build + environment (credenciales BD) + expose (puerto interno) + volumes (imágenes)
# Nginx → image + ports (puerto exterior) + volumes (nginx.conf)