<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Título de la página de edición de pregunta -->
    <!-- Title of the question editing page -->
    <title>Editar Pregunta - Harry Potter Quiz</title>
    
    <!-- Hoja de estilos del panel de administración -->
    <!-- Admin panel stylesheet -->
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <!-- Título principal de la página -->
    <!-- Main page title -->
    <h1>Editar Pregunta</h1>

    <!-- 
        Formulario para actualizar la pregunta 
        IMPORTANTE: La ruta debe coincidir exactamente con el endpoint del backend
    -->
    <!-- 
        Form to update the question
        IMPORTANT: The action must match exactly with the backend endpoint
    -->
    <form action="/admin/actualizar_pregunta/{{ pregunta.id }}" 
          method="post" 
          enctype="multipart/form-data">

        <!-- Campo para editar el texto de la pregunta -->
        <!-- Field to edit the question text -->
        <label>Texto de la pregunta:</label>
        <input type="text" name="texto_pregunta" value="{{ pregunta.texto_pregunta }}" required><br><br>

        <!-- Bucle que recorre las 4 respuestas existentes de la pregunta -->
        <!-- Loop that iterates through the 4 existing answers of the question -->
        {% for r in pregunta.respuestas %}
            <h3>Respuesta {{ loop.index }}</h3>

            <!-- Campo para editar el texto de cada respuesta -->
            <!-- Field to edit each answer's text -->
            <label>Texto:</label>
            <input type="text" name="respuesta{{ loop.index }}" value="{{ r.texto_respuesta }}" required>

            <!-- Selector para cambiar la casa asociada a la respuesta -->
            <!-- Selector to change the house associated with the answer -->
            <label>Casa:</label>
            <select name="casa{{ loop.index }}">
                <option value="Gryffindor" {% if r.casa=="Gryffindor" %}selected{% endif %}>Gryffindor</option>
                <option value="Slytherin" {% if r.casa=="Slytherin" %}selected{% endif %}>Slytherin</option>
                <option value="Ravenclaw" {% if r.casa=="Ravenclaw" %}selected{% endif %}>Ravenclaw</option>
                <option value="Hufflepuff" {% if r.casa=="Hufflepuff" %}selected{% endif %}>Hufflepuff</option>
            </select>

            <!-- Muestra la imagen actual si existe -->
            <!-- Shows current image if it exists -->
            {% if r.imagen %}
                <p>Imagen actual:</p>
                <img src="/static/{{ r.imagen }}" width="100">
            {% endif %}

            <!-- Campo para subir una nueva imagen (opcional) -->
            <!-- Field to upload a new image (optional) -->
            <label>Cambiar imagen:</label>
            <input type="file" name="imagen{{ loop.index }}"><br><br>

        {% endfor %}

        <!-- Botón para guardar los cambios -->
        <!-- Button to save changes -->
        <button type="submit">Actualizar Pregunta</button>
    </form>

    <!-- Enlace para volver al panel principal sin guardar cambios -->
    <!-- Link to return to the main panel without saving changes -->
    <a href="/admin">Volver al panel</a>
</body>
</html>
